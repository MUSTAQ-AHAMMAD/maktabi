version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: maktabi_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: maktabi_db
      POSTGRES_USER: maktabi
      POSTGRES_PASSWORD: maktabi123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maktabi -d maktabi_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: maktabi_backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: "postgresql://maktabi:maktabi123@postgres:5432/maktabi_db"
      JWT_SECRET: "maktabi-super-secret-jwt-key-2024"
      PORT: 3001
      FRONTEND_URL: "http://localhost:3000"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "npx prisma migrate deploy && npx ts-node prisma/seed.ts && node dist/main"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: maktabi_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:3001"
    depends_on:
      - backend

volumes:
  postgres_data:
